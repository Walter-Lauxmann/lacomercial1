<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Comercial</title>
    <link rel="stylesheet" href="./css/estilos.css">
</head>
<body>
    <header>
        <h1>La Comercial</h1>
    </header>
    <nav class="menu">
        <div class="contenedor">
            <ul class="menu-flex">
                <li><a href="./">Inicio</a></li>
                <li><a href="./nosotros.html">Nosotros</a></li>
                <li><a href="./productos.html">Productos</a></li>
                <li><a href="./contactenos.html">Contáctenos</a></li>
            </ul>
        </div>
    </nav>
    <main class="contenedor sombra">
        <h2>Listado de productos</h2>
        <section class="servicios" id="lista-productos">
        </section>   
        
        <!-- Carrito de compras -->
         <section class="carrito">
            <h3>Carrito de compras</h3>
            <table>
                <thead>
                    <tr>
                        <th>Código</th>
                        <th>Nombre</th>
                        <th>Cantidad</th>
                        <th>Precio</th>
                        <th>Importe</th>
                    </tr>
                </thead>
                <tbody id="lista-tabla">                    
                </tbody>
                <tfoot>
                    <tr>
                        <td colspan="3"></td>
                        <td>Total</td>
                        <td>$ <span id="total"></span>.-</td>
                    </tr>
                </tfoot>
            </table>
         </section>
        

    </main>
    <footer>
        <p>La Comercial - Todos los derechos reservados - 2026</p>
    </footer>

    <!-- Scripts -->
    <script type="module" src="./controladores/lista-productos.js"></script>
    <script src="./controladores/carrito-compras.js"></script>
</body>
</html>
